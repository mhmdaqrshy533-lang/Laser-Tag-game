name: Build Android APK (تنكيل-SGMW)

on:
  push:
    branches: [ main, master, production ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Signed Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies & Build Web App
        run: |
          npm ci
          npm run build

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # تحسين: التعديل هنا لضمان تثبيت أدوات البناء تلقائياً وبأحدث نسخة
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          build-tools-version: '34.0.0'
          sdk-version: '34'

      - name: Initialize and Sync Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Android Release APK with Gradle
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Sign Android Release APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        # إزالة continue-on-error هنا إذا كنت تريد أن يفشل البناء عند عدم وجود مفاتيح التوقيع
        # للحفاظ على الانضباط الأمني في عملك.

      - name: Rename and Prepare Build Artifacts
        run: |
          mkdir -p build-outputs
          # تحسين مسار النسخ للتعامل مع المخرجات الموقعة وغير الموقعة
          cp android/app/build/outputs/apk/release/*.apk build-outputs/ || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowForce-Android-Build
          path: build-outputs/
          retention-days: 7
